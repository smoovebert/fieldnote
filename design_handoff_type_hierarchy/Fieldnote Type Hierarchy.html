<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Fieldnote — type & visual hierarchy</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="type-hierarchy.css?v=1" />
<style>
  html, body { margin: 0; height: 100%; background: #2a2e35; }
  body { font-family: "Inter Tight", system-ui, sans-serif; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="type-shell.jsx"></script>
<script type="text/babel" src="type-pages.jsx"></script>
<script type="text/babel">
function App() {
  return (
    <DesignCanvas defaultZoom={0.5} background="#2a2e35">
      <DCSection id="system" title="The system">
        <DCArtboard id="spec" label="Type & hierarchy spec — eight tiers, one job each" width={1280} height={2200}>
          <TypeSpec />
        </DCArtboard>
      </DCSection>
      <DCSection id="pages" title="Mode pages re-typed">
        <DCArtboard id="overview" label="Overview · T1 page title, T7 eyebrow, key/value props" width={1440} height={900}><PageOverview /></DCArtboard>
        <DCArtboard id="code"     label="Code · T1 source name, single accent color, hierarchy in inspector" width={1440} height={900}><PageCode /></DCArtboard>
        <DCArtboard id="organize" label="Organize · table with T7 headers and T4 row titles" width={1440} height={900}><PageOrganize /></DCArtboard>
        <DCArtboard id="analyze"  label="Analyze · T2 page title (mode without object), tabs and matrix" width={1440} height={900}><PageAnalyze /></DCArtboard>
        <DCArtboard id="report"   label="Report · T1 serif display, editorial codebook" width={1440} height={1100}><PageReport /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
