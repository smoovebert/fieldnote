name: Supabase keepalive

on:
  schedule:
    - cron: '17 15 */3 * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-keepalive
  cancel-in-progress: false

jobs:
  keepalive:
    name: Ping Supabase
    runs-on: ubuntu-latest
    steps:
      - name: Call Fieldnote keepalive RPC
        env:
          SUPABASE_URL: ${{ secrets.FIELDNOTE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.FIELDNOTE_SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "Missing FIELDNOTE_SUPABASE_URL or FIELDNOTE_SUPABASE_ANON_KEY repository secret."
            exit 1
          fi

          response="$(mktemp)"
          status="$(
            curl --silent --show-error --location --max-time 30 \
              --request POST "${SUPABASE_URL%/}/rest/v1/rpc/fieldnote_keepalive" \
              --header "apikey: ${SUPABASE_ANON_KEY}" \
              --header "authorization: Bearer ${SUPABASE_ANON_KEY}" \
              --header "content-type: application/json" \
              --data '{}' \
              --output "$response" \
              --write-out "%{http_code}"
          )"

          cat "$response"

          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "Supabase keepalive failed with HTTP $status."
            exit 1
          fi
